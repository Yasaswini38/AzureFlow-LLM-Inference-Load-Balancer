<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AzureFlow — MaaS Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="root">
        <div class="topbar">
            <div class="brand">
                <div class="brand-icon"><svg viewBox="0 0 16 16"><path d="M8 2L2 5v6l6 3 6-3V5L8 2zm0 1.5l4.5 2.25L8 8 3.5 5.75 8 3.5zM3 7l4.5 2.25v4.25L3 11.25V7zm5.5 6.5v-4.25L13 7v4.25L8.5 13.5z"/></svg></div>
                <div>
                    <div class="brand-name">AzureFlow</div>
                    <div class="brand-sub">LLM Inference Load Balancer</div>
                </div>
            </div>
            <div class="status-pill"><div class="dot"></div><span>Live Telemetry</span></div>
        </div>

        <div class="metrics">
            <div class="metric"><div class="metric-label">Requests/sec</div><div id="rps" class="metric-value">0</div></div>
            <div class="metric"><div class="metric-label">Avg latency</div><div id="lat" class="metric-value">0ms</div></div>
            <div class="metric"><div class="metric-label">Queue depth</div><div id="queue" class="metric-value">0</div></div>
            <div class="metric"><div class="metric-label">Success rate</div><div id="srate" class="metric-value">100%</div></div>
        </div>

        <div class="section-label">Inference Cluster — Replica Status</div>
        <div class="nodes-grid" id="nodes-grid"></div>

        <div class="controls">
            <button class="btn btn-primary" onclick="killNode()">Chaos: Kill Random Node</button>
            <button class="btn" onclick="restoreNodes()">Heal Cluster</button>
            <span id="log-msg" style="font-size: 11px; color: #94a3b8; margin-left: 15px;"></span>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
