
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-mono,'Courier New',monospace)}
.root{padding:1rem 0;color:var(--color-text-primary)}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:28px;height:28px;background:#0078d4;border-radius:6px;display:flex;align-items:center;justify-content:center}
.brand-icon svg{width:16px;height:16px;fill:white}
.brand-name{font-size:15px;font-weight:500;letter-spacing:-0.3px}
.brand-sub{font-size:11px;color:var(--color-text-secondary);letter-spacing:0.5px;text-transform:uppercase}
.status-pill{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);padding:4px 10px;border-radius:20px}
.dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px}
.metric-label{font-size:11px;color:var(--color-text-secondary);letter-spacing:0.4px;text-transform:uppercase;margin-bottom:4px}
.metric-value{font-size:22px;font-weight:500;font-family:var(--font-mono)}
.metric-delta{font-size:11px;margin-top:2px}
.section-label{font-size:11px;color:var(--color-text-secondary);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px}
.nodes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.node{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px;transition:border-color 0.2s}
.node.hot{border-color:#ef4444}
.node.warm{border-color:#f59e0b}
.node.cool{border-color:#22c55e}
.node-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.node-id{font-size:12px;font-weight:500;font-family:var(--font-mono)}
.node-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-family:var(--font-sans)}
.badge-gpt4{background:#dbeafe;color:#1e40af}
.badge-mistral{background:#fce7f3;color:#9d174d}
.badge-llama{background:#d1fae5;color:#065f46}
.bar-track{height:5px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden;margin-bottom:6px}
.bar-fill{height:100%;border-radius:3px;transition:width 0.4s ease}
.bar-green{background:#22c55e}
.bar-amber{background:#f59e0b}
.bar-red{background:#ef4444}
.node-stats{display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-secondary)}
.queue-section{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem}
.panel{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px}
.panel-title{font-size:12px;font-weight:500;margin-bottom:10px;color:var(--color-text-secondary);letter-spacing:0.3px}
.request-list{display:flex;flex-direction:column;gap:4px;height:130px;overflow:hidden}
.req{display:flex;align-items:center;justify-content:space-between;font-size:11px;padding:4px 8px;border-radius:4px;background:var(--color-background-secondary);font-family:var(--font-mono);animation:slideIn 0.3s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.req-id{color:var(--color-text-secondary)}
.req-model{font-weight:500}
.req-status{padding:2px 6px;border-radius:8px;font-size:10px;font-family:var(--font-sans)}
.status-routing{background:#dbeafe;color:#1e40af}
.status-processing{background:#fef3c7;color:#92400e}
.status-done{background:#d1fae5;color:#065f46}
.latency-bars{display:flex;flex-direction:column;gap:6px}
.lat-row{display:flex;align-items:center;gap:8px}
.lat-label{font-size:11px;color:var(--color-text-secondary);width:60px;flex-shrink:0}
.lat-bar{height:14px;border-radius:3px;transition:width 0.5s ease;min-width:4px}
.lat-value{font-size:11px;font-family:var(--font-mono);color:var(--color-text-primary);width:48px;text-align:right}
.controls{display:flex;gap:8px;align-items:center}
.btn{font-size:12px;padding:6px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer;font-family:var(--font-sans)}
.btn:hover{background:var(--color-background-secondary)}
.btn-primary{background:#0078d4;color:white;border-color:#0078d4}
.btn-primary:hover{background:#0066b8}
.traffic-label{font-size:11px;color:var(--color-text-secondary)}
select{font-size:12px;padding:5px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
.throughput-row{display:flex;align-items:flex-end;gap:3px;height:50px;margin-bottom:1.5rem}
.tp-bar{flex:1;background:#0078d4;border-radius:2px 2px 0 0;opacity:0.7;transition:height 0.4s ease;min-height:2px}
</style>
<div class="root">
  <div class="topbar">
    <div class="brand">
      <div class="brand-icon"><svg viewBox="0 0 16 16"><path d="M8 2L2 5v6l6 3 6-3V5L8 2zm0 1.5l4.5 2.25L8 8 3.5 5.75 8 3.5zM3 7l4.5 2.25v4.25L3 11.25V7zm5.5 6.5v-4.25L13 7v4.25L8.5 13.5z"/></svg></div>
      <div>
        <div class="brand-name">AzureFlow</div>
        <div class="brand-sub">LLM Inference Load Balancer</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <select id="traffic-sel" onchange="setTraffic(this.value)">
        <option value="low">Low traffic</option>
        <option value="med" selected>Medium traffic</option>
        <option value="high">High traffic</option>
        <option value="burst">Burst mode</option>
      </select>
      <div class="status-pill"><div class="dot"></div><span id="status-txt">Live</span></div>
    </div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Requests/sec</div>
      <div class="metric-value" id="rps">0</div>
      <div class="metric-delta" id="rps-d" style="color:#22c55e">— </div>
    </div>
    <div class="metric">
      <div class="metric-label">Avg latency</div>
      <div class="metric-value" id="lat">0ms</div>
      <div class="metric-delta" id="lat-d" style="color:#22c55e">— </div>
    </div>
    <div class="metric">
      <div class="metric-label">Queue depth</div>
      <div class="metric-value" id="queue">0</div>
      <div class="metric-delta" id="q-d" style="color:#22c55e">— </div>
    </div>
    <div class="metric">
      <div class="metric-label">Success rate</div>
      <div class="metric-value" id="srate">100%</div>
      <div class="metric-delta" id="sr-d" style="color:#22c55e">— </div>
    </div>
  </div>

  <div class="section-label">Inference nodes — 6 replicas</div>
  <div class="nodes-grid" id="nodes-grid"></div>

  <div class="section-label">Throughput (last 20s)</div>
  <div class="throughput-row" id="tp-row"></div>

  <div class="queue-section">
    <div class="panel">
      <div class="panel-title">Request stream</div>
      <div class="request-list" id="req-list"></div>
    </div>
    <div class="panel">
      <div class="panel-title">P50 / P95 / P99 latency by model</div>
      <div class="latency-bars" id="lat-bars"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-primary" onclick="addSpike()">Inject traffic spike</button>
    <button class="btn" onclick="killNode()">Kill random node</button>
    <button class="btn" onclick="healNodes()">Restore nodes</button>
    <span class="traffic-label" id="sim-note"></span>
  </div>
</div>

<script>
const MODELS = ['GPT-4o','Mistral-7B','Llama-3.1'];
const MODEL_BADGES = ['badge-gpt4','badge-mistral','badge-llama'];
const REGIONS = ['eastus','westus','northeu'];

let trafficLevel = 'med';
let nodes = [];
let tpHistory = new Array(20).fill(0);
let reqCounter = 1000;
let requests = [];
let tick = 0;
let prevRps = 0, prevLat = 0, prevQ = 0, prevSr = 100;
let spikeRemaining = 0;

const TRAFFIC = {
  low:   {rps:[3,8],   baseLat:[60,150],  queueMax:3,  failRate:0.005},
  med:   {rps:[12,22], baseLat:[90,280],  queueMax:8,  failRate:0.01},
  high:  {rps:[30,50], baseLat:[150,450], queueMax:20, failRate:0.03},
  burst: {rps:[60,120],baseLat:[300,900], queueMax:50, failRate:0.08},
};

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

function initNodes(){
  nodes = Array.from({length:6},(_,i)=>({
    id:`node-${String(i+1).padStart(2,'0')}`,
    model: MODELS[i%3],
    badgeClass: MODEL_BADGES[i%3],
    region: REGIONS[i%3],
    load:rand(5,30),
    latency:rand(80,200),
    reqs:rand(100,800),
    alive:true
  }));
}

function renderNodes(){
  const g = document.getElementById('nodes-grid');
  g.innerHTML = nodes.map(n=>{
    const lp = n.alive ? n.load : 0;
    const barCls = lp>80?'bar-red':lp>60?'bar-amber':'bar-green';
    const nodeCls = lp>80?'hot':lp>60?'warm':'cool';
    const statusTxt = n.alive ? `${lp}% load` : 'OFFLINE';
    const lat = n.alive ? `${n.latency}ms` : '—';
    return `<div class="node ${n.alive?nodeCls:''}">
      <div class="node-header">
        <span class="node-id">${n.id}</span>
        <span class="node-badge ${n.badgeClass}">${n.model}</span>
      </div>
      <div class="bar-track"><div class="bar-fill ${barCls}" style="width:${lp}%"></div></div>
      <div class="node-stats">
        <span>${statusTxt}</span>
        <span>${lat}</span>
        <span style="color:var(--color-text-secondary)">${n.region}</span>
      </div>
    </div>`;
  }).join('');
}

function renderThroughput(){
  const row = document.getElementById('tp-row');
  const max = Math.max(...tpHistory,1);
  row.innerHTML = tpHistory.map(v=>{
    const pct = Math.round((v/max)*100);
    return `<div class="tp-bar" style="height:${Math.max(pct,2)}%"></div>`;
  }).join('');
}

function renderRequests(){
  const list = document.getElementById('req-list');
  const shown = requests.slice(-6).reverse();
  list.innerHTML = shown.map(r=>{
    const cls = r.status==='done'?'status-done':r.status==='processing'?'status-processing':'status-routing';
    return `<div class="req"><span class="req-id">#${r.id}</span><span class="req-model">${r.model}</span><span class="req-status ${cls}">${r.status}</span></div>`;
  }).join('');
}

function renderLatencyBars(){
  const container = document.getElementById('lat-bars');
  const cfg = TRAFFIC[trafficLevel];
  container.innerHTML = MODELS.map((m,i)=>{
    const base = cfg.baseLat[0] + (i*30);
    const p50 = rand(base, base+50);
    const p95 = rand(p50+30, p50+100);
    const p99 = rand(p95+20, p95+80);
    const maxL = p99;
    return `
      <div>
        <div style="font-size:11px;font-weight:500;margin-bottom:4px;color:var(--color-text-secondary)">${m}</div>
        ${[['P50',p50],['P95',p95],['P99',p99]].map(([lbl,val])=>`
        <div class="lat-row">
          <span class="lat-label">${lbl}</span>
          <div class="bar-track" style="flex:1;height:8px"><div class="bar-fill ${val>400?'bar-red':val>200?'bar-amber':'bar-green'}" style="width:${Math.min(Math.round(val/maxL*100),100)}%"></div></div>
          <span class="lat-value">${val}ms</span>
        </div>`).join('')}
      </div>`;
  }).join('');
}

function updateMetrics(){
  const cfg = TRAFFIC[trafficLevel];
  const spike = spikeRemaining > 0 ? 2.5 : 1;
  const aliveCount = nodes.filter(n=>n.alive).length;
  const scaleFactor = aliveCount/6;

  const rps = Math.round((rand(...cfg.rps) * spike * scaleFactor));
  const lat = Math.round(rand(...cfg.baseLat) * (aliveCount<4?1.6:1) * (spikeRemaining>0?1.4:1));
  const q   = Math.min(Math.round(rand(0, cfg.queueMax) * spike / scaleFactor), 99);
  const sr  = Math.max(Math.round((1 - cfg.failRate*(aliveCount<3?3:1)) * 1000)/10, 90);

  tpHistory.push(rps); tpHistory.shift();

  function delta(cur, prev, unit='', invert=false){
    const diff = cur - prev;
    if(diff===0) return '—';
    const color = (invert ? diff<0 : diff>0) ? '#22c55e' : '#ef4444';
    const sign = diff>0?'+':'';
    return `<span style="color:${color}">${sign}${diff}${unit}</span>`;
  }

  document.getElementById('rps').textContent = rps;
  document.getElementById('lat').textContent = lat+'ms';
  document.getElementById('queue').textContent = q;
  document.getElementById('srate').textContent = sr.toFixed(1)+'%';
  document.getElementById('rps-d').innerHTML = delta(rps,prevRps,'/s');
  document.getElementById('lat-d').innerHTML = delta(lat,prevLat,'ms',true);
  document.getElementById('q-d').innerHTML = delta(q,prevQ,'',true);
  document.getElementById('sr-d').innerHTML = delta(Math.round(sr),Math.round(prevSr),'%');

  prevRps=rps; prevLat=lat; prevQ=q; prevSr=sr;

  nodes.forEach(n=>{
    if(!n.alive) return;
    const base = rand(5, Math.min(95, cfg.queueMax*4 + (spikeRemaining>0?40:0)));
    n.load = Math.min(99, Math.round(base * spike * (1/scaleFactor)));
    n.latency = Math.round(rand(...cfg.baseLat));
    n.reqs += rand(1,rps);
  });

  const newReqs = Math.min(rand(1,3), 4);
  for(let i=0;i<newReqs;i++){
    const statuses = ['routing','processing','done','done','done'];
    requests.push({
      id: reqCounter++,
      model: pick(MODELS),
      status: pick(statuses)
    });
  }
  if(requests.length>30) requests = requests.slice(-30);

  if(spikeRemaining>0){
    spikeRemaining--;
    document.getElementById('sim-note').textContent = `Spike active — ${spikeRemaining}s remaining`;
  } else {
    document.getElementById('sim-note').textContent = '';
  }
}

function setTraffic(v){
  trafficLevel = v;
}

function addSpike(){
  spikeRemaining = 10;
  document.getElementById('sim-note').textContent = 'Spike injected!';
}

function killNode(){
  const alive = nodes.filter(n=>n.alive);
  if(alive.length<=1){document.getElementById('sim-note').textContent='Cannot kill last node';return;}
  const target = pick(alive);
  target.alive = false;
  document.getElementById('sim-note').textContent = `${target.id} killed — rerouting traffic...`;
}

function healNodes(){
  nodes.forEach(n=>{n.alive=true;n.load=rand(10,40)});
  document.getElementById('sim-note').textContent = 'All nodes restored';
}

function loop(){
  tick++;
  updateMetrics();
  renderNodes();
  renderThroughput();
  renderRequests();
  if(tick%3===0) renderLatencyBars();
}

initNodes();
renderNodes();
renderThroughput();
renderRequests();
renderLatencyBars();
setInterval(loop, 1200);
</script>
